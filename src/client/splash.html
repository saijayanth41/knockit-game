<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Knockit</title>
  </head>
  <body class="app">
    <div class="rings">
      <div class="ring ring-outer"></div>
      <div class="ring ring-middle"></div>
      <div class="ring ring-gold"></div>
      <div class="stone stone-orange"></div>
      <div class="stone stone-grey"></div>
    </div>
    <div class="content">
      <h1 class="title">KNOCKIT</h1>
      <p class="tagline">The board remembers everyone.</p>
      <p class="description" id="greeting">
        Three stones a day. One shared board. Knock, bank, avenge.
      </p>
    </div>
    <div>
      <button class="start-button" id="start-button">Play today's board</button>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
